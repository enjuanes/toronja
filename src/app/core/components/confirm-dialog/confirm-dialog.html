<dialog
  #confirmationDialog
  (cancel)="cancel()"
  aria-labelledby="confirm-dialog-msg"
  class="static-neo-card m-auto w-full max-w-sm rounded-2xl bg-neutral-50 p-5 text-center text-pretty backdrop:bg-black/40 dark:bg-neutral-900"
>
  <p id="confirm-dialog-msg" class="mb-5 text-lg">{{ message() }}</p>
  <div class="flex justify-center gap-3">
    <button
      type="button"
      (click)="confirm()"
      class="neo-button mt-2 rounded-lg bg-green-500 px-4 py-2 font-semibold text-white"
    >
      OK
    </button>
    <button
      type="button"
      (click)="cancel()"
      class="neo-button mt-2 rounded-lg bg-red-500 px-4 py-2 font-semibold text-white"
    >
      Cancel
    </button>
  </div>
</dialog>
