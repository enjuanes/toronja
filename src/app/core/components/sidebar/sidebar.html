@if (open()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-40 bg-black/40"
    (click)="close()"
    (keydown.escape)="close()"
    tabindex="-1"
    aria-hidden="true"
  ></div>
}

<!-- Sidebar -->
<nav
  class="fixed top-0 left-0 z-50 flex h-full flex-col border-r-2 bg-neutral-50 transition-transform duration-300 dark:border-neutral-400 dark:bg-neutral-900"
  [class.-translate-x-full]="!open()"
  [attr.aria-hidden]="!open()"
>
  <div
    class="flex items-center justify-between gap-10 border-b-2 px-4 py-3 dark:border-neutral-400"
  >
    <a routerLink="/" class="text-toronja-500 segoe-emoji text-xl font-semibold" (click)="close()"
      >🍊 Toronja</a
    >
    <button
      type="button"
      (click)="close()"
      aria-label="Close menu"
      class="flex cursor-pointer p-1 transition hover:text-red-500"
    >
      <span class="material-symbols-rounded flex" aria-hidden="true">close</span>
    </button>
  </div>

  <ul class="flex-1 overflow-y-auto" role="list">
    <li>
      <a
        routerLink="/"
        (click)="close()"
        class="group flex items-center gap-3 border-b-2 px-4 py-3 transition outline-none dark:border-neutral-400"
      >
        <span
          class="material-symbols-rounded transition group-hover:translate-x-2 group-focus:translate-x-2"
          aria-hidden="true"
          >dashboard</span
        >
        <span class="transition group-hover:translate-x-2 group-focus:translate-x-2"
          >Dashboard</span
        >
      </a>
    </li>
    @for (page of pages; track page.code) {
      <li>
        <a
          [routerLink]="'/' + page.code"
          [routerLinkActive]="page.cardBackground"
          (click)="close()"
          class="group flex items-center gap-3 border-b-2 px-4 py-3 outline-none dark:border-neutral-400"
        >
          <span
            class="material-symbols-rounded transition group-hover:translate-x-2 group-focus:translate-x-2"
            aria-hidden="true"
            >{{ page.icon }}</span
          >
          <span class="transition group-hover:translate-x-2 group-focus:translate-x-2">{{
            page.title
          }}</span>
        </a>
      </li>
    }
  </ul>

  <div class="p-4">
    <button
      type="button"
      (click)="themeService.cycle()"
      [attr.aria-label]="'Theme: ' + themeService.current()"
      class="neo-button flex w-full items-center gap-3 rounded-lg bg-amber-300 px-4 py-3 transition dark:bg-blue-900"
    >
      <span class="material-symbols-rounded" aria-hidden="true">{{ themeService.icon() }}</span>
      {{ themeService.title() }}
    </button>
  </div>
</nav>
