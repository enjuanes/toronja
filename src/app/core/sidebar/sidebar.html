@if (open()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm transition-opacity"
    (click)="close()"
    (keydown.escape)="close()"
    tabindex="-1"
    aria-hidden="true"
  ></div>
}

<!-- Sidebar -->
<nav
  class="fixed top-0 left-0 z-50 flex h-full flex-col border-r border-gray-200 bg-white transition-transform duration-300 dark:border-gray-700 dark:bg-gray-900"
  [class.-translate-x-full]="!open()"
  [attr.aria-hidden]="!open()"
>
  <div
    class="flex gap-5 items-center justify-between border-b border-gray-200 px-4 py-3 dark:border-gray-700"
  >
    <a routerLink="/" class="text-toronja-500 text-xl font-bold" (click)="close()">🍊 Toronja</a>
    <button
      type="button"
      (click)="close()"
      aria-label="Close menu"
      class="flex cursor-pointer rounded-lg p-1 text-gray-500 transition hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800"
    >
      <span class="material-symbols-rounded flex" aria-hidden="true">close</span>
    </button>
  </div>

  <ul class="flex-1 overflow-y-auto py-2" role="list">
    <li>
      <a
        routerLink="/"
        routerLinkActive="bg-toronja-50 text-toronja-600 dark:bg-toronja-950 dark:text-toronja-400"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="close()"
        class="flex items-center gap-3 px-4 py-3 text-gray-700 transition hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800"
      >
        <span class="material-symbols-rounded" aria-hidden="true">dashboard</span>
        Dashboard
      </a>
    </li>
    @for (page of pages; track page.code) {
      <li>
        <a
          [routerLink]="'/' + page.code"
          routerLinkActive="bg-toronja-50 text-toronja-600 dark:bg-toronja-950 dark:text-toronja-400"
          (click)="close()"
          class="flex items-center gap-3 px-4 py-3 text-gray-700 transition hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800"
        >
          <span class="material-symbols-rounded" aria-hidden="true">{{ page.icon }}</span>
          {{ page.title }}
        </a>
      </li>
    }
  </ul>

  <div class="border-t border-gray-200 px-4 py-3 dark:border-gray-700">
    <button
      type="button"
      (click)="themeService.cycle()"
      [attr.aria-label]="'Theme: ' + themeService.current()"
      class="flex w-full cursor-pointer items-center gap-3 rounded-lg px-4 py-3 text-gray-700 transition hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800"
    >
      <span class="material-symbols-rounded" aria-hidden="true">{{ themeService.icon() }}</span>
      {{ themeService.title() }}
    </button>
  </div>
</nav>
