<app-sidebar [(open)]="sidebarOpen" />

<header class="fixed top-0 flex items-center justify-between px-4 py-3">
  <div class="flex items-center gap-3">
    <button
      type="button"
      (click)="sidebarOpen.set(true)"
      aria-label="Open menu"
      class="neo-button flex cursor-pointer rounded-md bg-neutral-50 p-1 dark:bg-neutral-900"
    >
      <span class="material-symbols-rounded" aria-hidden="true">menu</span>
    </button>
    <h1 class="text-xl font-semibold">Chronometer</h1>
  </div>
</header>

<main class="flex h-dvh flex-col items-center justify-center gap-8">
  <span class="text-7xl tabular-nums sm:text-8xl">
    {{ display() }}
  </span>

  <div class="flex gap-4">
    <button
      type="button"
      (click)="togglePlayPause()"
      aria-label="Pause"
      class="neo-button bg-tornja-500 z-10 flex rounded-lg p-2 text-white"
      [class]="running() ? 'bg-amber-500' : 'bg-green-500'"
    >
      <span class="material-symbols-rounded filled text-3xl leading-none" aria-hidden="true">{{
        running() ? 'pause' : 'play_arrow'
      }}</span>
    </button>

    @if (started()) {
      <button
        type="button"
        (click)="stop()"
        aria-label="Stop"
        class="neo-button flex rounded-lg bg-red-500 p-2 text-white"
        [animate.enter]="animationsEnabled() ? 'enter-animation' : null"
        [animate.leave]="animationsEnabled() ? 'leave-animation' : null"
      >
        <span class="material-symbols-rounded filled text-3xl leading-none" aria-hidden="true"
          >stop</span
        >
      </button>
    }
  </div>
</main>
