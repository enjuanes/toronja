<app-sidebar [(open)]="sidebarOpen" />

<header class="fixed top-0 flex items-center justify-between px-4 py-3">
  <div class="flex items-center gap-3">
    <button
      type="button"
      (click)="sidebarOpen.set(true)"
      aria-label="Open menu"
      class="flex cursor-pointer rounded-lg p-1 text-gray-600 transition hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800"
    >
      <span class="material-symbols-rounded" aria-hidden="true">menu</span>
    </button>
    <h1 class="text-xl font-bold">Chronometer</h1>
  </div>
</header>

<main class="flex flex-col h-dvh items-center justify-center gap-8">
  <span class="font-mono text-7xl font-light tabular-nums sm:text-8xl">
    {{ display() }}
  </span>

  <div class="flex gap-4">
    @if (running()) {
      <button
        type="button"
        (click)="pause()"
        aria-label="Pause"
        class="bg-toronja-500 hover:bg-toronja-600 flex size-14 cursor-pointer items-center justify-center rounded-full text-white shadow-lg transition active:scale-95"
      >
        <span class="material-symbols-rounded filled text-3xl" aria-hidden="true">pause</span>
      </button>
    } @else {
      <button
        type="button"
        (click)="start()"
        aria-label="Start"
        class="bg-toronja-500 hover:bg-toronja-600 flex size-14 cursor-pointer items-center justify-center rounded-full text-white shadow-lg transition active:scale-95"
      >
        <span class="material-symbols-rounded filled text-3xl" aria-hidden="true">
          play_arrow
        </span>
      </button>
    }

    @if (started()) {
      <button
        type="button"
        (click)="stop()"
        aria-label="Stop"
        class="flex size-14 cursor-pointer items-center justify-center rounded-full bg-gray-200 text-gray-700 shadow-lg transition hover:bg-gray-300 active:scale-95 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600"
      >
        <span class="material-symbols-rounded filled text-3xl" aria-hidden="true">stop</span>
      </button>
    }
  </div>
</main>
