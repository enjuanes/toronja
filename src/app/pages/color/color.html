<app-sidebar [(open)]="sidebarOpen" />

<div
  class="relative h-dvh"
  [style.background-color]="'#' + color()"
  [class.cursor-none]="!headerVisible()"
  (mousemove)="onMouseMove()"
  (click)="onMouseMove()"
>
  <header
    class="header fixed top-0 right-0 left-0 z-10 flex items-center justify-between px-4 py-3 transition-opacity duration-300"
    [class]="isLight() ? 'text-neutral-900' : 'text-white'"
    [class.opacity-0]="!headerVisible()"
    [class.pointer-events-none]="!headerVisible()"
  >
    <button
      type="button"
      (click)="sidebarOpen.set(true)"
      aria-label="Open menu"
      class="flex cursor-pointer rounded-lg border-2 p-1 transition outline-none hover:scale-90 focus:scale-90 active:scale-80"
    >
      <span class="material-symbols-rounded" aria-hidden="true">menu</span>
    </button>

    <div class="flex items-center gap-3">
      <button
        type="button"
        (click)="randomColor()"
        aria-label="Random color"
        class="flex cursor-pointer rounded-lg border-2 p-1 transition outline-none hover:scale-90 focus:scale-90 active:scale-80"
      >
        <span class="material-symbols-rounded" aria-hidden="true">casino</span>
      </button>

      <button
        type="button"
        (click)="openPicker()"
        aria-label="Pick a color"
        class="flex cursor-pointer rounded-lg border-2 p-1 transition outline-none hover:scale-90 focus:scale-90 active:scale-80"
      >
        <span class="material-symbols-rounded" aria-hidden="true">palette</span>
      </button>

      <button
        type="button"
        (click)="toggleFullscreen()"
        [attr.aria-label]="isFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen'"
        class="flex cursor-pointer rounded-lg border-2 p-1 transition outline-none hover:scale-90 focus:scale-90 active:scale-80"
      >
        <span class="material-symbols-rounded" aria-hidden="true">{{
          isFullscreen() ? 'fullscreen_exit' : 'fullscreen'
        }}</span>
      </button>
    </div>
  </header>
</div>
<dialog
  #colorDialog
  (click)="onDialogClick($event)"
  class="static-neo-card m-auto w-full max-w-xs rounded-2xl bg-neutral-50 p-0 backdrop:bg-black/40 dark:bg-neutral-900"
>
  <!-- <div class="flex flex-col items-center gap-5" [formGroup]="pickerForm"> -->
  <form [formGroup]="pickerForm" class="flex flex-col items-center gap-6 p-6">
    <div class="flex w-full justify-between">
      <h2 class="text-lg font-semibold">Pick a color</h2>
      <button
        type="button"
        (click)="closePicker()"
        aria-label="Close"
        class="flex cursor-pointer p-1 transition hover:text-red-500"
      >
        <span class="material-symbols-rounded" aria-hidden="true">close</span>
      </button>
    </div>
    <input
      type="color"
      formControlName="picker"
      class="h-32 w-32 cursor-pointer"
      aria-label="Color picker"
    />

    <input
      type="text"
      formControlName="hex"
      maxlength="7"
      class="focus:border-toronja-500 rounded-lg border-2 bg-transparent px-3 py-2 transition outline-none dark:border-neutral-400"
      aria-label="Hex color code"
    />
  </form>
</dialog>
