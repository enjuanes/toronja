<app-sidebar [(open)]="sidebarOpen" />

<header
  class="sticky top-0 z-10 flex items-center justify-between border-b-2 bg-neutral-50 px-4 py-3 dark:bg-neutral-900"
>
  <div class="flex items-center gap-3">
    <button
      type="button"
      (click)="sidebarOpen.set(true)"
      aria-label="Open menu"
      class="neo-button flex rounded-md p-1"
    >
      <span class="material-symbols-rounded" aria-hidden="true">menu</span>
    </button>
    <h1 class="text-xl font-semibold">Countdown</h1>
  </div>
</header>

<main class="flex flex-col items-center justify-center gap-6 px-4 pt-32">
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="static-neo-card flex w-full max-w-sm flex-col gap-5 rounded-2xl border bg-neutral-50 p-6 dark:bg-neutral-900"
  >
    <h2 class="text-lg font-semibold">Create Countdown</h2>
    <div class="flex flex-col gap-1">
      <label for="countdown-time" class="font-medium">Date & Time *</label>
      <input
        id="countdown-time"
        type="datetime-local"
        formControlName="time"
        class="focus:border-toronja-500 rounded-lg border-2 bg-transparent px-3 py-2 transition outline-none"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label for="countdown-name" class="font-medium">
        Name <span class="text-neutral-400 dark:text-neutral-500">(optional)</span>
      </label>
      <input
        id="countdown-name"
        type="text"
        formControlName="name"
        placeholder="e.g. Half-Life 3 Release"
        class="focus:border-toronja-500 rounded-lg border-2 bg-transparent px-3 py-2 transition outline-none"
      />
    </div>

    <button
      type="submit"
      [disabled]="form.invalid"
      class="neo-button bg-toronja-500 mt-2 flex items-center justify-center gap-2 rounded-lg px-4 py-2 font-semibold text-white transition disabled:cursor-not-allowed disabled:opacity-50"
    >
      <span class="material-symbols-rounded" aria-hidden="true">calendar_clock</span>
      Start Countdown
    </button>
  </form>
</main>
