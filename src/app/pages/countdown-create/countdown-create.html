<app-sidebar [(open)]="sidebarOpen" />

<header
  class="sticky top-0 z-10 flex items-center justify-between border-b border-gray-200 bg-white px-4 py-3 dark:border-gray-700 dark:bg-gray-900"
>
  <div class="flex items-center gap-3">
    <button
      type="button"
      (click)="sidebarOpen.set(true)"
      aria-label="Open menu"
      class="flex cursor-pointer rounded-lg p-1 text-gray-600 transition hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800"
    >
      <span class="material-symbols-rounded" aria-hidden="true">menu</span>
    </button>
    <h1 class="text-xl font-bold">Countdown</h1>
  </div>
</header>

<main class="pt-32 flex flex-col items-center justify-center gap-6 px-4">
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="flex w-full max-w-sm flex-col gap-5 rounded-2xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-700 dark:bg-gray-900"
  >
    <div class="flex flex-col gap-1.5">
      <label for="countdown-time" class="text-sm font-medium text-gray-700 dark:text-gray-300">
        Date & Time <span class="text-toronja-500">*</span>
      </label>
      <input
        id="countdown-time"
        type="datetime-local"
        formControlName="time"
        class="rounded-lg border border-gray-300 bg-white px-3 py-2 transition focus:border-toronja-500 focus:ring-2 focus:ring-toronja-500/20 focus:outline-none dark:border-gray-600 dark:bg-gray-800"
      />
    </div>

    <div class="flex flex-col gap-1.5">
      <label for="countdown-name" class="text-sm font-medium text-gray-700 dark:text-gray-300">
        Name <span class="text-gray-400 dark:text-gray-500">(optional)</span>
      </label>
      <input
        id="countdown-name"
        type="text"
        formControlName="name"
        placeholder="e.g. Half-Life 3 Release"
        class="rounded-lg border border-gray-300 bg-white px-3 py-2 transition focus:border-toronja-500 focus:ring-2 focus:ring-toronja-500/20 focus:outline-none dark:border-gray-600 dark:bg-gray-800"
      />
    </div>

    <button
      type="submit"
      [disabled]="form.invalid"
      class="bg-toronja-500 hover:bg-toronja-600 disabled:bg-toronja-300 dark:disabled:bg-toronja-800 mt-2 cursor-pointer rounded-lg px-4 py-2.5 font-medium text-white shadow-sm transition disabled:cursor-not-allowed"
    >
      Start Countdown
    </button>
  </form>
</main>
