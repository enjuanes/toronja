<header
  class="sticky top-0 z-10 flex items-center justify-between border-b-2 bg-neutral-50 px-4 dark:bg-neutral-900"
>
  <a
    class="text-toronja-500 border-r-2 border-neutral-900 py-4 pe-4 text-xl font-semibold dark:border-white"
    routerLink="/"
  >
    <span class="segoe-emoji me-1 text-2xl">🍊</span>Toronja
  </a>
  <button
    type="button"
    (click)="themeService.cycle()"
    [attr.aria-label]="'Theme: ' + themeService.current()"
    class="neo-button flex rounded-md bg-amber-300 p-2 transition dark:bg-blue-900"
  >
    <span class="material-symbols-rounded" aria-hidden="true">
      {{ themeService.icon() }}
    </span>
  </button>
</header>

<section
  class="mx-auto grid max-w-7xl grid-cols-1 gap-4 p-4 pt-6 sm:grid-cols-2 md:pt-16 lg:grid-cols-3 lg:pt-32 xl:grid-cols-4"
>
  @for (page of pages; track page.code) {
    <a
      [routerLink]="page.code"
      class="neo-card flex flex-col items-start gap-4 rounded-2xl bg-neutral-50 p-6 dark:bg-neutral-900"
    >
      <span
        class="material-symbols-rounded filled rounded-lg p-2 text-3xl leading-none transition-transform duration-300"
        [class]="page.cardBackground"
        aria-hidden="true"
      >
        {{ page.icon }}
      </span>
      <div class="min-w-0">
        <h2 class="text-lg font-semibold">
          {{ page.title }}
        </h2>
        <p class="mt-1 text-sm">
          {{ page.description }}
        </p>
      </div>
      <span class="material-symbols-rounded mt-auto self-end" aria-hidden="true">
        arrow_forward
      </span>
    </a>
  }
</section>
